<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Connected App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        .header {
            background-color: #11111b;
            padding: 15px; text-align: center;
            border-bottom: 2px solid #313244;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 20;
        }
        h3 { margin: 0 0 5px 0; font-size: 16px; }
        #countdown { color: #f38ba8; font-weight: bold; }
        .status-text { font-size: 12px; color: #a6e3a1; margin-top: 4px; }
        
        /* Container area for displaying the website smoothly */
        .display-container {
            flex-grow: 1;
            width: 100%;
            background-color: #ffffff;
            border: none;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

        .overlay-loading {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 46, 0.95);
            display: flex; justify-content: center; align-items: center;
            color: #cdd6f4; font-style: italic;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h3>Connected Bot (Python + HTML)</h3>
        <div>Forcing Unique IP Rotation in: <span id="countdown">30</span>s</div>
        <div id="proxyStatus" class="status-text">Status: Starting engine...</div>
    </div>

    <div class="display-container">
        <div id="loadingOverlay" class="overlay-loading">Python is shifting proxy routes & killing cache memory...</div>
        
        <iframe id="webFrame" src="http://127.0.0.1:5000/get_page_with_new_ip?init=1"></iframe>
    </div>

    <script>
        const frame = document.getElementById('webFrame');
        const timerDisplay = document.getElementById('countdown');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const proxyStatus = document.getElementById('proxyStatus');
        
        let secondsLeft = 30;

        function reloadFrame() {
            loadingOverlay.style.display = "flex";
            proxyStatus.textContent = "Status: Sending cache-breaker request to local server...";
            
            // Generate a random string to force Chrome to completely drop cache memory
            let cacheBreaker = Math.random().toString(36).substring(2);
            
            // Force the frame to load from the Python proxy stream using a unique link variant
            frame.src = "http://127.0.0.1:5000/get_page_with_new_ip?cb=" + cacheBreaker;
        }

        // Hide overlay once the frame completely finishes rendering data sent by Python
        frame.onload = function() {
            loadingOverlay.style.display = "none";
            proxyStatus.textContent = "Status: Unique IP block loaded and view rendered successfully!";
        };

        // 30-second loop execution ticker
        setInterval(() => {
            secondsLeft--;
            timerDisplay.textContent = secondsLeft;

            if (secondsLeft <= 0) {
                secondsLeft = 30;
                timerDisplay.textContent = secondsLeft;
                reloadFrame();
            }
        }, 1000);
    </script>

</body>
</html>
