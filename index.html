<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interstitial Ad</title>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    margin-top:100px;
}

button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}

#adOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:none;
    flex-direction:column;
    z-index:9999;
}

#topBar{
    height:50px;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
}

#closeBtn{
    display:none;
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    font-size:20px;
    cursor:pointer;
}

#adFrame{
    flex:1;
    width:100%;
    border:none;
}
</style>
</head>

<body>

<h1>My Website</h1>

<button id="startBtn">Start Ad</button>

<div id="adOverlay">
    <div id="topBar">
        <span id="timer">You can skip this ad in 60 seconds...</span>
        <button id="closeBtn">×</button>
    </div>

    <iframe id="adFrame" src="about:blank"></iframe>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const adOverlay = document.getElementById("adOverlay");
const adFrame = document.getElementById("adFrame");
const timer = document.getElementById("timer");
const closeBtn = document.getElementById("closeBtn");

let interval;

startBtn.addEventListener("click", function(){

    clearInterval(interval);

    adOverlay.style.display = "flex";

    adFrame.src = "https://omg10.com/4/10933293";

    let seconds = 60;

    timer.textContent =
        "You can skip this ad in 60 seconds...";

    closeBtn.style.display = "none";

    interval = setInterval(function(){

        seconds--;

        timer.textContent =
            "You can skip this ad in " +
            seconds +
            " seconds...";

        if(seconds <= 0){

            clearInterval(interval);

            timer.textContent =
                "Advertisement finished.";

            closeBtn.style.display = "block";
        }

    },1000);
});

closeBtn.addEventListener("click", function(){

    clearInterval(interval);

    adOverlay.style.display = "none";

    adFrame.src = "about:blank";
});
</script>

</body>
</html>
